  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #262626;
      --accent: #ffffff; /* Branco mais claro */
      --accent-2: #e0e0e0; /* Um tom um pouco mais escuro para o gradiente */
      --muted: #b0b0b0;
      --glass: rgba(255,255,255,0.03);
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 10% 10%, #0d0d0d 0%, var(--bg) 40%), #000;
      height: 100vh;

    canvas#rain {

      left: 0;
      z-index: 0;

    .card {
      width: 100%;

      border-radius: 14px;
      padding: 18px;

      box-shadow: 0 8px 30px rgba(0,0,0,0.6);

      position: relative;
      z-index: 2;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {

      color: var(--bg); /* Texto do botão em preto para contraste */

      font-size: 16px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .tab {

      padding: 10px;
      border-radius: 10px;
      text-align: center;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      font-weight: 600;
      color: var(--muted);
      border: 1px solid transparent;
    }

    .tab.active {
      background: linear-gradient(90deg, rgba(255,255,255,0.12), rgba(224,224,224,0.08));
      border-color: rgba(255,255,255,0.18);
      color: var(--accent);
    }

    .panel-content {

    }

    .option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.01);
      border: 1px solid rgba(255,255,255,0.02);
    }

    .option label {
      font-weight: 600;
      color: var(--muted);
    }

    .switch {
      width: 40px;
      height: 24px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      position: relative;
    }

    .switch .knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: all .18s ease;
    }

    .switch.on {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .switch.on .knob {
      left: 19px;
      background: var(--bg); /* knob em preto para contraste */
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .target {
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.2);
      position: relative;
      cursor: pointer;
    }

    .option-item {

      margin-top: 6px;

<script>
  // --- Lista de senhas válidas (adicione ou remova aqui) ---
const VALID_KEYS = [
  "7",
  "777",
  "betinha",
  "isagay"
];

// Verifica a senha (case-insensitive)
function verificarSenha(){
  const v = document.getElementById('senha').value.trim();
  if (!v) {
    alert('Digite a senha.');
    return;
  }

  // compara sem diferenciar maiúsculas/minúsculas
  const normalized = v.toUpperCase();
  const allowedNormalized = VALID_KEYS.map(k => k.toUpperCase());

  if (allowedNormalized.includes(normalized)) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('painel').style.display = 'block';
  } else {
    alert('Senha incorreta! Tente novamente.');
  }
}

  function setTab(i){
    for (let t = 1; t <= 3; t++){
      document.getElementById('tab' + t).classList.remove('active');
      document.getElementById('content' + t).style.display = 'none';
    }
    document.getElementById('tab' + i).classList.add('active');
    document.getElementById('content' + i).style.display = 'block';
  }

  function toggle(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('on');

  // Mensagens customizadas para cada switch
  const messages = {
    'swAimbot': 'Aimbot Legit ' + (el.classList.contains('on') ? 'Ativado' : 'Desativado'),
    'swNeck': 'Precisão Full ' + (el.classList.contains('on') ? 'Ativada' : 'Desativada'),
    'swHs': 'HS 100% ' + (el.classList.contains('on') ? 'Ativado' : 'Desativado'),
    'swRecoil': 'NoRecoil ' + (el.classList.contains('on') ? 'Ativado' : 'Desativado'),
    'swAuto': 'Facilitar acertos na cabeça ' + (el.classList.contains('on') ? 'Ativado' : 'Desativado'),
    'swSens': 'Aumentar Taxa ' + (el.classList.contains('on') ? 'Ativada' : 'Desativada'),
    'swAimlock': 'Aimlock 100% ' + (el.classList.contains('on') ? 'Ativado' : 'Desativado'),
    'swMiraCalibrada': 'Mira Calibrada ' + (el.classList.contains('on') ? 'Ativada' : 'Desativada')
  };

  if (messages[id]) showNotification(messages[id]);
}

// Função para mostrar notificações temporárias
function showNotification(msg) {
  const n = document.getElementById('notify');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => {
    n.style.display = 'none';
  }, 1500); // tempo de exibição em ms
}

  function atualizarFOV(valor) {
    document.getElementById('fovValue').textContent = valor + '%';
  }

  // Função Free Fire completa
  function abrirFreeFire() {
    const n = document.getElementById('notify');
    n.style.display = 'block';
    n.textContent = 'Abrindo Free Fire...';
    
    const freeFireLinks = [
      'freefire://',
      'intent://com.dts.freefireth#Intent;scheme=freefire;package=com.dts.freefireth;end',
      'intent://com.dts.freefireth/com.dts.freefireth.FFMainActivity#Intent;scheme=freefire;package=com.dts.freefireth;end',
      'com.dts.freefireth://',
      'freefire://com.dts.freefireth'
    ];
    
    let opened = false;
    
    for (let link of freeFireLinks) {
      try {
        const a = document.createElement('a');
        a.href = link;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        opened = true;
        break;
      } catch (e) {
        console.log('Erro ao tentar abrir link:', link);
      }
    }

    if (!opened) {
      alert('Não foi possível abrir o Free Fire. Certifique-se que o jogo está instalado.');
    }

    setTimeout(() => {
      n.style.display = 'none';
    }, 2500);
  }

  // DROPDOWN DE TARGET
  function abrirDropdown() {
    const opts = document.getElementById('targetOptions');
    opts.style.display = opts.style.display === 'block' ? 'none' : 'block';
  }

  function selecionarTarget(txt) {
    // atualiza corretamente o texto visível do targetSelect
    const sel = document.getElementById('targetSelect');
    // primeiro nó textual (antes do menu)
    if (sel && sel.firstChild) sel.firstChild.textContent = txt;
    document.getElementById('targetOptions').style.display = 'none';
  }

  // --- ANIMAÇÃO DE CHUVA (mantida) ---
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  const drops = [];
  for(let i = 0; i < 150; i++) {
    drops.push({
      x: Math.random()*W,
            y: Math.random()*H,
      l: Math.random()*1,
      xs: -4 + Math.random()*4 + 2,
      ys: Math.random()*10 + 10
    });
  }

  // Converte valor CSS (hex ou rgb) pra rgba com alpha
  function parseCssColorToRgba(cssColor, alpha) {
    if (!cssColor) return `rgba(255,255,255,${alpha})`; // Cor padrão para chuva branca
    cssColor = cssColor.trim();
    // se for algo como 'rgb(...)' ou 'rgba(...)' retorna com alpha trocado
    if (cssColor.startsWith('rgb')) {
      const nums = cssColor.replace(/[^\d,]/g, '').split(',');
      if (nums.length >= 3) return `rgba(${nums[0]},${nums[1]},${nums[2]},${alpha})`;
    }
    // se for hex (#rrggbb)
    if (cssColor.startsWith('#')) {
      let hex = cssColor.slice(1);
      if (hex.length === 3) {
        hex = hex.split('').map(h => h + h).join('');
      }
      const r = parseInt(hex.slice(0,2),16);
      const g = parseInt(hex.slice(2,4),16);
      const b = parseInt(hex.slice(4,6),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
    // fallback
    return `rgba(255,255,255,${alpha})`;
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    // pega a --accent atual ou a cor definida no colorPicker para a chuva
    const rainColor = document.getElementById('colorPicker') ? document.getElementById('colorPicker').value : '#ffffff';
    ctx.strokeStyle = parseCssColorToRgba(rainColor, 0.5);
    ctx.lineWidth = 1;
    ctx.lineCap = 'round';

    for(let i = 0; i < drops.length; i++){
      const d = drops[i];
      ctx.beginPath();
      ctx.moveTo(d.x,d.y);
      ctx.lineTo(d.x + d.l*d.xs, d.y + d.l*d.ys);
      ctx.stroke();

      d.x += d.xs;
      d.y += d.ys;

      if(d.x > W || d.y > H){
        d.x = Math.random()*W;
        d.y = -20;
      }
    }
    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  });

  // FUNÇÃO DE MUDANÇA DE COR (TAB 3)
  function alterarCor(cor){
    // Este `alterarCor` agora atualiza apenas a cor da chuva.
    // As cores gerais do painel são fixas em preto e branco.
    // A chuva pegará o valor do input diretamente no `draw`.
  }

  // A função shadeColor não é mais necessária para as cores principais do painel.
  // Será usada apenas se o colorPicker da chuva precisar de variações.
  function shadeColor(hex, percent) {
    try {
      let col = hex.replace('#','');
      if (col.length === 3) col = col.split('').map(c => c + c).join('');
      const num = parseInt(col,16);
      let r = (num >> 16) + Math.round((percent/100)*255);
      let g = (num >> 8 & 0x00FF) + Math.round((percent/100)*255);
      let b = (num & 0x0000FF) + Math.round((percent/100)*255);
      r = Math.max(0, Math.min(255, r));
      g = Math.max(0, Math.min(255, g));
      b = Math.max(0, Math.min(255, b));
      return '#' + ( (1<<24) + (r<<16) + (g<<8) + b ).toString(16).slice(1);
    } catch (e) {
      return hex;
    }
  }

</script>
